<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Formatter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #f8fafc;
    }
    .panels {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: row;
      align-items: stretch;
    }
    .panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    textarea {
      width: 100%;
      min-height: 240px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.8rem;
      padding: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #6366f1; }
    #output {
      min-height: 240px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a5f3fc;
      user-select: all;
    }
    #output.flash { animation: output-flash 0.7s ease-out forwards; }
    @keyframes output-flash {
      0%   { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25); }
      100% { border-color: #334155; box-shadow: none; }
    }

    /* ── Connector ── */
    .connector {
      width: 72px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .connector::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: #334155;
      transform: translateY(-50%);
    }
    .connector-beam {
      position: absolute;
      top: 50%; left: -40px;
      transform: translateY(-50%);
      width: 40px; height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, transparent, #818cf8, #e0e7ff);
      opacity: 0;
      pointer-events: none;
    }
    .connector.flowing .connector-beam {
      animation: beam-flow 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes beam-flow {
      0%   { left: -40px; opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { left: calc(100% + 40px); opacity: 0; }
    }
    .connector-arrow {
      position: relative;
      z-index: 1;
      font-size: 1.2rem;
      color: #475569;
      line-height: 1;
      user-select: none;
    }
    .connector.flowing .connector-arrow { animation: arrow-glow 0.55s ease-out; }
    @keyframes arrow-glow {
      0%   { color: #475569; }
      40%  { color: #a5b4fc; text-shadow: 0 0 12px #6366f1; }
      100% { color: #475569; text-shadow: none; }
    }
    @keyframes beam-flow-v {
      0%   { top: -24px; opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { top: calc(100% + 24px); opacity: 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .panels { flex-direction: column; }
      .connector { width: auto; height: 44px; overflow: hidden; }
      .connector::before {
        top: 0; bottom: 0; left: 50%; right: auto;
        width: 1px; height: 100%;
        transform: translateX(-50%);
      }
      .connector-beam {
        left: 50%; top: -24px;
        transform: translateX(-50%);
        width: 6px; height: 24px;
        background: linear-gradient(180deg, transparent, #818cf8, #e0e7ff);
      }
      .connector.flowing .connector-beam {
        animation: beam-flow-v 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
      .connector-arrow { transform: rotate(90deg); }
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #22c55e;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <h1>Certificate / Key Formatter</h1>

  <div class="panels">
    <div class="panel">
      <label for="input">Input</label>
      <textarea id="input" spellcheck="false" placeholder='Paste here, e.g. {"str":"-----BEGIN PRIVATE KEY-----\nMII..."}'></textarea>
    </div>

    <div class="connector" id="connector">
      <div class="connector-beam"></div>
      <span class="connector-arrow">→</span>
    </div>

    <div class="panel">
      <label>Output</label>
      <div id="output">Formatted certificate will appear here...</div>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    function extractPEM(raw) {
      let text = raw.trim();

      // Try to parse as JSON to extract any string value automatically
      try {
        const parsed = JSON.parse(text);
        text = findPEMString(parsed);
      } catch {
        // Not valid JSON — try to extract the string value manually
        // Match a quoted string value after a key like "str": "..."
        const match = text.match(/"(?:[^"\\]|\\.)*-----BEGIN[^"]*-----(?:[^"\\]|\\.)*-----END[^"]*-----(?:[^"\\]|\\.)*"/);
        if (match) {
          try {
            text = JSON.parse(match[0]);
          } catch {
            // fall through
          }
        }
      }

      // Replace literal \n with newlines
      text = text.replace(/\\n/g, '\n');

      // Extract PEM block(s)
      const pemRegex = /(-----BEGIN [A-Z0-9 ]+-----[\s\S]*?-----END [A-Z0-9 ]+-----)/g;
      const blocks = text.match(pemRegex);

      if (blocks) {
        return blocks.map(b => cleanPEM(b)).join('\n\n');
      }

      throw new Error('No PEM certificate or key found in the input.');
    }

    function findPEMString(obj) {
      if (typeof obj === 'string') return obj;
      if (Array.isArray(obj)) {
        for (const item of obj) {
          try { return findPEMString(item); } catch { /* continue */ }
        }
      } else if (obj && typeof obj === 'object') {
        for (const val of Object.values(obj)) {
          try { return findPEMString(val); } catch { /* continue */ }
        }
      }
      throw new Error('No string value found');
    }

    function cleanPEM(pem) {
      const lines = pem.split('\n').map(l => l.trim()).filter(Boolean);
      const header = lines[0];
      const footer = lines[lines.length - 1];
      const body = lines.slice(1, -1).join('');
      // Re-wrap body at 64 chars
      const wrapped = body.match(/.{1,64}/g) || [];
      return [header, ...wrapped, footer].join('\n');
    }

    function format() {
      const input = document.getElementById('input').value;
      const output = document.getElementById('output');
      if (!input.trim()) {
        output.innerHTML = '<span class="error">Please paste some input first.</span>';
        return;
      }
      try {
        output.textContent = extractPEM(input);
        output.classList.remove('error');
      } catch (e) {
        output.innerHTML = '<span class="error">' + escapeHTML(e.message) + '</span>';
      }
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function copyOutput() {
      const text = document.getElementById('output').textContent;
      if (!text || text.startsWith('Formatted')) return;
      try {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard!');
      } catch {
        showToast('Copy failed — select and copy manually.');
      }
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').textContent = 'Formatted certificate will appear here...';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function triggerFlowAnimation() {
      const connector = document.getElementById('connector');
      const output = document.getElementById('output');
      connector.classList.remove('flowing');
      output.classList.remove('flash');
      void connector.offsetWidth;
      connector.classList.add('flowing');
      output.classList.add('flash');
      setTimeout(() => connector.classList.remove('flowing'), 600);
      setTimeout(() => output.classList.remove('flash'), 750);
    }

    // Auto-format + auto-copy on paste
    document.getElementById('input').addEventListener('paste', () => {
      setTimeout(async () => {
        const input = document.getElementById('input').value;
        const output = document.getElementById('output');
        if (!input.trim()) return;
        try {
          const result = extractPEM(input);
          output.textContent = result;
          output.classList.remove('error');
          triggerFlowAnimation();
          await navigator.clipboard.writeText(result);
          showToast('Formatted & copied to clipboard!');
        } catch (e) {
          output.innerHTML = '<span class="error">' + escapeHTML(e.message) + '</span>';
        }
      }, 50);
    });
  </script>
</body>
</html>
